<div class="phw-widget-ctr phw-hsc-widget" data-ps="hsc-div-1">
  <div class="phw-container phw-hsc-container" data-ps="hsc-div-2">
    <section class="phw-hsc-hero" role="region" aria-label="Career hero search" data-ps="hsc-section-1">
      <figure class="phw-hsc-media" role="presentation" data-ps="hsc-figure-1">
        <img
          src="/dist/assets/images/steps_3.png"
          alt="People collaborating in a modern workplace"
          class="phw-hsc-image"
          data-map-id="image"
          data-component="widget-image"
          data-ps="hsc-img-1"
        />
      </figure>
      <div class="phw-hsc-overlay" data-ps="hsc-div-3"></div>

      <div class="phw-hsc-content" data-ps="hsc-div-4">
        <div class="phw-hsc-copy" data-ps="hsc-div-5">
          <p class="phw-hsc-caption" data-map-id="widget-caption" data-component="widget-caption">Careers</p>
          <h2 data-map-id="widget-heading" data-component="widget-title" data-ps="hsc-h2-1">
            Find your next role with teams that build what matters.
          </h2>
          <div
            class="phw-hsc-subtitle"
            data-tag-type="p"
            data-map-id="widget-sub-heading"
            data-component="widget-subtitle"
            data-ps="hsc-p-1"
          >
            Search by role or department, then choose your preferred location. This centered variant keeps text and
            search aligned to the middle for a strong intro focus.
          </div>
        </div>

        <form class="phw-hsc-form" action="javascript:void(0)" method="get" role="search" aria-label="Job search" data-ps="hsc-form-1">
          <label class="phw-sr-only" for="hsc-role">Role or department</label>
          <input
            id="hsc-role"
            name="role"
            type="text"
            placeholder="Role or department"
            class="phw-hsc-input"
            data-map-id="search-role"
            data-component="search-role"
          />

          <label class="phw-sr-only" for="hsc-location">Location</label>
          <input
            id="hsc-location"
            name="location"
            type="text"
            placeholder="Location"
            class="phw-hsc-input"
            data-map-id="search-location"
            data-component="search-location"
          />

          <button
            type="submit"
            class="phw-btn phw-g-btn-primary phw-hsc-submit"
            data-map-id="widget-action-link"
            data-component="widget-link"
            data-ps="hsc-button-1"
          >
            Search jobs
          </button>
        </form>
      </div>
    </section>
  </div>
</div>
